<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>FinancePro • Desktop + Mobile Navbar</title>

    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>

    <style>
        * { 
            box-sizing: border-box; 
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif; 
            -webkit-font-smoothing: antialiased; 
        }
        :root {
            --primary: #007AFF;
            --success: #34C759;
            --danger: #FF3B30;
            --warning: #FF9500;
            --system-gray: #8E8E93;
            --background: #F2F2F7;
            --surface: #FFFFFF;
            --border: rgba(60, 60, 67, 0.12);
            --radius-ios: 16px;
            --shadow-ios: 0 10px 40px rgba(0,0,0,0.06);
            --headbar-height: 72px;
            --card-height: 450px; 
        }

        body { 
            background-color: var(--background); 
            color: #000; 
            margin: 0; 
            padding-top: calc(var(--headbar-height) + 10px); 
        }
        .headbar {
            height: var(--headbar-height);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 0.5px solid var(--border);
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            padding: 0 24px; 
            position: fixed; 
            top: 0; 
            width: 100%; 
            z-index: 1000;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-text {
            font-weight: 800;
            font-size: 20px;
            background: linear-gradient(145deg, #1c1c1e, #3a3a3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .desktop-nav-items {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .mobile-nav-items {
            display: none;
            align-items: center;
        }
        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 20px; 
        }
        .summary-row {
            display: grid; 
            grid-template-columns: repeat(3, 1fr);
            gap: 20px; 
            margin-bottom: 25px;
        }
        .summary-item { 
            background: #fff; 
            padding: 20px; 
            border-radius: var(--radius-ios); 
            border: 0.5px solid var(--border); 
            box-shadow: var(--shadow-ios); 
        }
        .summary-label { 
            font-size: 10px; 
            font-weight: 800; 
            color: var(--system-gray); 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        .summary-val { 
            font-size: 26px; 
            font-weight: 800; 
            margin-top: 5px; 
        }
        .dashboard-grid {
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px; 
            margin-bottom: 30px;
        }
        .card-main {
            background: var(--surface); 
            border-radius: var(--radius-ios);
            border: 0.5px solid var(--border); 
            box-shadow: var(--shadow-ios);
            padding: 24px; 
            height: var(--card-height); 
            display: flex; 
            flex-direction: column;
        }
        .card-title { 
            font-size: 11px; 
            font-weight: 800; 
            color: var(--system-gray); 
            text-transform: uppercase; 
            margin-bottom: 20px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        .input-group { margin-bottom: 12px; }
        .input-group label { 
            display: block; 
            font-size: 10px; 
            font-weight: 700; 
            color: var(--system-gray); 
            margin-bottom: 4px; 
        }
        .input-group input, .input-group select {
            width: 100%; 
            padding: 12px; 
            border-radius: 10px; 
            border: 1.5px solid #F2F2F7;
            background: #F9F9FB; 
            font-size: 14px; 
            outline: none; 
            transition: 0.2s;
        }
        .input-group input:focus { 
            border-color: var(--primary); 
            background: #fff; 
        }
        .btn-primary {
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 15px;
            border-radius: 12px; 
            font-weight: 700; 
            cursor: pointer; 
            width: 100%;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            margin-top: auto;
        }
        .table-card { 
            background: #fff; 
            border-radius: var(--radius-ios); 
            border: 0.5px solid var(--border); 
            overflow: hidden; 
            box-shadow: var(--shadow-ios); 
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
        }
        th { 
            background: #F9F9FB; 
            padding: 14px; 
            text-align: left; 
            font-size: 11px; 
            color: var(--system-gray); 
            border-bottom: 0.5px solid var(--border); 
        }
        td { 
            padding: 14px; 
            border-bottom: 0.5px solid var(--border); 
            font-size: 14px; 
        }
        .balance-danger { 
            background: var(--danger) !important; 
            color: #fff !important; 
        }
        .balance-danger .summary-label { 
            color: rgba(255,255,255,0.8); 
        }
        .chart-box { 
            flex: 1; 
            position: relative; 
            min-height: 0; 
        }
        .mobile-cards {
            display: none;
        }
        @media (max-width: 1100px) and (min-width: 721px) {
            .dashboard-grid {
                grid-template-columns: repeat(2, 1fr) !important;
            }
            .dashboard-grid > :nth-child(3) {
                grid-column: span 2;
            }
            .card-main {
                height: auto !important;
                min-height: 400px;
            }
        }
        @media (max-width: 720px) {
            .desktop-nav-items {
                display: none !important;
            }
            .mobile-nav-items {
                display: flex !important;
            }
            .headbar {
                padding: 0 16px;
            }
            .logo-text {
                font-size: 18px;
            }
            .dashboard-grid {
                grid-template-columns: 1fr !important;
            }
            .dashboard-grid > :nth-child(3) {
                grid-column: span 1;
            }
            .card-main {
                height: auto !important;
                min-height: 420px;
            }
            .summary-row {
                gap: 12px;
            }
            .summary-item {
                padding: 16px;
            }
            .summary-val {
                font-size: 22px;
            }
        }
        @media (max-width: 550px) {
            table {
                display: none;
            }
            .table-card {
                background: transparent !important;
                box-shadow: none;
                padding: 0;
            }
            .mobile-cards {
                display: flex;
                flex-direction: column;
                gap: 14px;
            }
            .mobile-card-item {
                background: var(--surface);
                border-radius: var(--radius-ios);
                border: 0.5px solid var(--border);
                padding: 18px 16px;
                box-shadow: var(--shadow-ios);
                display: flex;
                flex-direction: column;
                gap: 12px;
            }
            .mobile-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .mobile-category span {
                background: #F2F2F7;
                padding: 5px 12px;
                border-radius: 40px;
                font-size: 11px;
                font-weight: 700;
            }
            .mobile-actions {
                display: flex;
                gap: 20px;
                justify-content: flex-end;
                border-top: 1px dashed var(--border);
                padding-top: 14px;
                margin-top: 6px;
            }
            .action-btn-mobile {
                background: transparent;
                border: none;
                cursor: pointer;
                color: var(--system-gray);
                padding: 8px;
                border-radius: 40px;
            }
            .delete-mobile {
                color: var(--danger);
            }
        }
        @media (max-width: 412px) {
            .btn-primary {
                padding: 16px;
            }
            .summary-item {
                padding: 14px;
            }
            .summary-val {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <header class="headbar">
        <div class="logo-area">
            <span class="logo-text">FinancePro</span>
        </div>

        <div style="display:flex; align-items:center; gap:12px;">
            <span class="desktop-nav-items" style="font-size: 11px; font-weight: 800; color: var(--system-gray);">IR PARA:</span>
            <input type="month" id="mesSelecionado" style="border:none; background:rgba(0,122,255,0.1); color:var(--primary); padding:8px 12px; border-radius:10px; font-weight:700; cursor:pointer; outline:none;">
        </div>
    </header>

    <div class="container">
        <div class="summary-row">
            <div class="summary-item">
                <div class="summary-label">Entradas</div>
                <div id="entradasTotal" class="summary-val" style="color:var(--success)">R$ 0,00</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">Saídas</div>
                <div id="saidasTotal" class="summary-val" style="color:var(--danger)">R$ 0,00</div>
            </div>
            <div class="summary-item" id="cartaoSaldo">
                <div class="summary-label">Saldo Final</div>
                <div id="saldoTotal" class="summary-val">R$ 0,00</div>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="card-main">
                <div class="card-title"><span class="material-icons-round" style="font-size:16px;">add_circle</span> Novo Lançamento</div>
                <form id="formLancamento" style="flex:1; display:flex; flex-direction:column;">
                    <input type="hidden" id="idEditando">
                    <div class="input-group">
                        <label>DESCRIÇÃO</label>
                        <input type="text" id="descricaoInput" placeholder="Ex: Salário" required>
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <div class="input-group">
                            <label>VALOR (R$)</label>
                            <input type="number" id="valorInput" step="0.01" required placeholder="0,00">
                        </div>
                        <div class="input-group">
                            <label>TIPO</label>
                            <select id="tipoSelect">
                                <option value="out">Despesa</option>
                                <option value="in">Receita</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>CATEGORIA</label>
                        <select id="categoriaSelect">
                            <option>Alimentação</option>
                            <option>Transporte</option>
                            <option>Moradia</option>
                            <option>Lazer</option>
                            <option>Saúde</option>
                            <option>Salário</option>
                            <option>Educação</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>DATA</label>
                        <input type="date" id="dataInput" required>
                    </div>
                    <button type="submit" class="btn-primary" id="botaoSalvar">
                        <span class="material-icons-round">bolt</span> Confirmar Lançamento
                    </button>
                </form>
            </div>

            <div class="card-main">
                <div class="card-title"><span class="material-icons-round" style="font-size:16px;">donut_small</span> Categorias</div>
                <div class="chart-box">
                    <canvas id="graficoPizza"></canvas>
                </div>
            </div>

            <div class="card-main">
                <div class="card-title"><span class="material-icons-round" style="font-size:16px;">timeline</span> Evolução Diária</div>
                <div class="chart-box">
                    <canvas id="graficoLinha"></canvas>
                </div>
            </div>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>DATA</th>
                        <th>DESCRIÇÃO</th>
                        <th>CATEGORIA</th>
                        <th>VALOR</th>
                        <th>AÇÕES</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
            <div id="cardsMobile" class="mobile-cards"></div>
        </div>
    </div>

    <script>
        (function() {
            let listaLancamentos = JSON.parse(localStorage.getItem('financas_simples')) || [];
            let graficoPizzaObj;
            let graficoLinhaObj;

            let mesPicker = document.getElementById('mesSelecionado');
            let corpoTabela = document.getElementById('corpoTabela');
            let divCards = document.getElementById('cardsMobile');
            let form = document.getElementById('formLancamento');
            let idEditando = document.getElementById('idEditando');
            let descInput = document.getElementById('descricaoInput');
            let valorInput = document.getElementById('valorInput');
            let tipoInput = document.getElementById('tipoSelect');
            let catInput = document.getElementById('categoriaSelect');
            let dataInput = document.getElementById('dataInput');
            let botao = document.getElementById('botaoSalvar');
            let entradasEl = document.getElementById('entradasTotal');
            let saidasEl = document.getElementById('saidasTotal');
            let saldoEl = document.getElementById('saldoTotal');
            let cartaoSaldo = document.getElementById('cartaoSaldo');

            function pegarMesAtual() {
                let hoje = new Date();
                let ano = hoje.getFullYear();
                let mes = String(hoje.getMonth() + 1).padStart(2, '0');
                mesPicker.value = `${ano}-${mes}`;
                dataInput.valueAsDate = hoje;
            }
            pegarMesAtual();

            function filtrarPorMes() {
                let mesEscolhido = mesPicker.value;
                if (!mesEscolhido) return [];
                return listaLancamentos.filter(item => item.data.startsWith(mesEscolhido));
            }

            function atualizarTela() {
                let filtrados = filtrarPorMes();

                let totalEntradas = 0;
                let totalSaidas = 0;
                filtrados.forEach(item => {
                    if (item.tipo === 'in') totalEntradas += item.valor;
                    else totalSaidas += item.valor;
                });
                let saldo = totalEntradas - totalSaidas;

                entradasEl.innerText = `R$ ${totalEntradas.toFixed(2).replace('.', ',')}`;
                saidasEl.innerText = `R$ ${totalSaidas.toFixed(2).replace('.', ',')}`;
                saldoEl.innerText = `R$ ${saldo.toFixed(2).replace('.', ',')}`;

                if (saldo < 0) cartaoSaldo.classList.add('balance-danger');
                else cartaoSaldo.classList.remove('balance-danger');

                let ordenados = [...filtrados].sort((a, b) => new Date(b.data) - new Date(a.data));

                corpoTabela.innerHTML = ordenados.map(item => {
                    let sinal = item.tipo === 'in' ? '+' : '-';
                    let corTexto = item.tipo === 'in' ? 'var(--success)' : '#000';
                    return `<tr>
                        <td style="color:var(--system-gray); font-size:12px;">${item.data.split('-').reverse().join('/')}</td>
                        <td><b>${item.descricao}</b></td>
                        <td><span style="background:#F2F2F7; padding:4px 8px; border-radius:6px; font-size:11px; font-weight:700;">${item.categoria}</span></td>
                        <td style="font-weight:800; color:${corTexto};">${sinal} R$ ${item.valor.toFixed(2).replace('.', ',')}</td>
                        <td>
                            <button onclick="editarItem(${item.id})" style="border:none; background:none; cursor:pointer; color:var(--system-gray);"><span class="material-icons-round" style="font-size:18px">edit</span></button>
                            <button onclick="excluirItem(${item.id})" style="border:none; background:none; cursor:pointer; color:var(--danger); margin-left:8px;"><span class="material-icons-round" style="font-size:18px">delete</span></button>
                        </td>
                    </tr>`;
                }).join('');

                divCards.innerHTML = ordenados.map(item => {
                    let sinal = item.tipo === 'in' ? '+' : '-';
                    let corTexto = item.tipo === 'in' ? '#34C759' : '#000';
                    return `<div class="mobile-card-item">
                        <div class="mobile-row">
                            <span style="color:var(--system-gray); font-size:13px;">${item.data.split('-').reverse().join('/')}</span>
                            <div class="mobile-category"><span>${item.categoria}</span></div>
                        </div>
                        <div class="mobile-row" style="font-weight:600; font-size:16px;">${item.descricao}</div>
                        <div class="mobile-row" style="font-weight:800; font-size:18px; color:${corTexto};">${sinal} R$ ${item.valor.toFixed(2).replace('.', ',')}</div>
                        <div class="mobile-actions">
                            <button class="action-btn-mobile" onclick="editarItem(${item.id})"><span class="material-icons-round">edit</span></button>
                            <button class="action-btn-mobile delete-mobile" onclick="excluirItem(${item.id})"><span class="material-icons-round">delete</span></button>
                        </div>
                    </div>`;
                }).join('');

                desenharGraficos(filtrados, mesPicker.value);
            }

            function desenharGraficos(dados, mesEscolhido) {
                let despesas = dados.filter(x => x.tipo === 'out');
                let categorias = {};
                despesas.forEach(x => categorias[x.categoria] = (categorias[x.categoria] || 0) + x.valor);

                if (graficoPizzaObj) graficoPizzaObj.destroy();
                graficoPizzaObj = new Chart(document.getElementById('graficoPizza'), {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(categorias),
                        datasets: [{ data: Object.values(categorias), backgroundColor: ['#007AFF','#34C759','#FF3B30','#FF9500','#5856D6','#FFCC00','#AF52DE'], borderWidth: 0 }]
                    },
                    options: { maintainAspectRatio: false, cutout: '78%', plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, font: {size: 10} } } } }
                });

                if (!mesEscolhido) return;
                let [ano, mesNum] = mesEscolhido.split('-').map(Number);
                let diasNoMes = new Date(ano, mesNum, 0).getDate();
                let entradasDia = Array(diasNoMes).fill(0);
                let saidasDia = Array(diasNoMes).fill(0);
                dados.forEach(item => {
                    let dia = parseInt(item.data.split('-')[2]) - 1;
                    if (item.tipo === 'in') entradasDia[dia] += item.valor;
                    else saidasDia[dia] += item.valor;
                });

                if (graficoLinhaObj) graficoLinhaObj.destroy();
                graficoLinhaObj = new Chart(document.getElementById('graficoLinha'), {
                    type: 'line',
                    data: {
                        labels: Array.from({length: diasNoMes}, (_, i) => i + 1),
                        datasets: [
                            { label: 'Entradas', data: entradasDia, borderColor: '#34C759', tension: 0.4, pointRadius: 0, fill: true, backgroundColor: 'rgba(52,199,89,0.05)' },
                            { label: 'Saídas', data: saidasDia, borderColor: '#FF3B30', tension: 0.4, pointRadius: 0, fill: true, backgroundColor: 'rgba(255,59,48,0.05)' }
                        ]
                    },
                    options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
                });
            }

            window.editarItem = function(id) {
                let item = listaLancamentos.find(i => i.id === id);
                if (!item) return;
                idEditando.value = item.id;
                descInput.value = item.descricao;
                valorInput.value = item.valor;
                tipoInput.value = item.tipo;
                catInput.value = item.categoria;
                dataInput.value = item.data;
                botao.innerHTML = '<span class="material-icons-round">sync</span> Atualizar Dados';
                window.scrollTo({top: 0, behavior: 'smooth'});
            };

            window.excluirItem = function(id) {
                if (confirm("Deseja realmente excluir este lançamento?")) {
                    listaLancamentos = listaLancamentos.filter(i => i.id !== id);
                    localStorage.setItem('financas_simples', JSON.stringify(listaLancamentos));
                    atualizarTela();
                }
            };

            form.onsubmit = (e) => {
                e.preventDefault();
                let id = idEditando.value;
                let novoItem = {
                    id: id ? parseInt(id) : Date.now(),
                    descricao: descInput.value,
                    valor: parseFloat(valorInput.value),
                    tipo: tipoInput.value,
                    categoria: catInput.value,
                    data: dataInput.value,
                };

                if (id) {
                    listaLancamentos = listaLancamentos.map(x => x.id === novoItem.id ? novoItem : x);
                } else {
                    listaLancamentos.push(novoItem);
                }

                localStorage.setItem('financas_simples', JSON.stringify(listaLancamentos));
                form.reset();
                idEditando.value = '';
                botao.innerHTML = '<span class="material-icons-round">bolt</span> Confirmar Lançamento';
                dataInput.valueAsDate = new Date();
                atualizarTela();
            };

            mesPicker.addEventListener('change', atualizarTela);
            atualizarTela();

            window.atualizarTela = atualizarTela;
        })();
    </script>

    <style>
        .action-btn-mobile {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--system-gray);
            padding: 8px 12px;
            border-radius: 40px;
            font-size: 20px;
        }
        .action-btn-mobile:hover {
            background: #F2F2F7;
        }
        .delete-mobile {
            color: var(--danger);
        }
    </style>
</body>
</html>
