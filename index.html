<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>FinancePro • Desktop + Mobile Navbar</title>
    
    <!-- SF Pro Display -->
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    <!-- Material Icons Round -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <!-- Chart.js estável -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>

    <style>
        /* === RESET E VARIÁVEIS === */
        :root {
            --primary: #007AFF;
            --success: #34C759;
            --danger: #FF3B30;
            --warning: #FF9500;
            --system-gray: #8E8E93;
            --background: #F2F2F7;
            --surface: #FFFFFF;
            --border: rgba(60, 60, 67, 0.12);
            --radius-ios: 16px;
            --shadow-ios: 0 10px 40px rgba(0,0,0,0.06);
            --headbar-height: 72px;
            --card-height: 450px; 
        }

        * { 
            box-sizing: border-box; 
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif; 
            -webkit-font-smoothing: antialiased; 
        }
        
        body { 
            background-color: var(--background); 
            color: #000; 
            margin: 0; 
            padding-top: calc(var(--headbar-height) + 10px); 
        }

        /* --- HEADBAR (FIXO) --- */
        .headbar {
            height: var(--headbar-height);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 0.5px solid var(--border);
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            padding: 0 24px; 
            position: fixed; 
            top: 0; 
            width: 100%; 
            z-index: 1000;
        }

        /* Logo area - sem ícone */
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-text {
            font-weight: 800;
            font-size: 20px;
            background: linear-gradient(145deg, #1c1c1e, #3a3a3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- VERSÃO DESKTOP DA NAVBAR --- */
        .desktop-nav-items {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .current-month-display {
            font-size: 18px; 
            font-weight: 700; 
            color: var(--primary);
            text-transform: capitalize; 
            border-left: 1.5px solid var(--border);
            padding-left: 15px; 
            margin-left: 15px;
        }

        /* --- VERSÃO MOBILE DA NAVBAR (sem ícone) --- */
        .mobile-nav-items {
            display: none;
            align-items: center;
        }

        .mobile-month-text {
            background: rgba(0,122,255,0.1);
            border-radius: 30px;
            padding: 6px 14px;
            color: var(--primary);
            font-weight: 600;
            font-size: 14px;
            border-left: 1.5px solid var(--border);
            margin-left: 12px;
        }

        /* --- CONTAINER --- */
        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 20px; 
        }

        /* --- SUMMARY ROW (3 cards) --- */
        .summary-row {
            display: grid; 
            grid-template-columns: repeat(3, 1fr);
            gap: 20px; 
            margin-bottom: 25px;
        }
        .summary-item { 
            background: #fff; 
            padding: 20px; 
            border-radius: var(--radius-ios); 
            border: 0.5px solid var(--border); 
            box-shadow: var(--shadow-ios); 
        }
        .summary-label { 
            font-size: 10px; 
            font-weight: 800; 
            color: var(--system-gray); 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        .summary-val { 
            font-size: 26px; 
            font-weight: 800; 
            margin-top: 5px; 
        }

        /* --- GRID PRINCIPAL (3 COLUNAS) - DESKTOP --- */
        .dashboard-grid {
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px; 
            margin-bottom: 30px;
        }

        .card-main {
            background: var(--surface); 
            border-radius: var(--radius-ios);
            border: 0.5px solid var(--border); 
            box-shadow: var(--shadow-ios);
            padding: 24px; 
            height: var(--card-height); 
            display: flex; 
            flex-direction: column;
        }

        .card-title { 
            font-size: 11px; 
            font-weight: 800; 
            color: var(--system-gray); 
            text-transform: uppercase; 
            margin-bottom: 20px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }

        /* --- FORMULÁRIO --- */
        .input-group { margin-bottom: 12px; }
        .input-group label { 
            display: block; 
            font-size: 10px; 
            font-weight: 700; 
            color: var(--system-gray); 
            margin-bottom: 4px; 
        }
        .input-group input, .input-group select {
            width: 100%; 
            padding: 12px; 
            border-radius: 10px; 
            border: 1.5px solid #F2F2F7;
            background: #F9F9FB; 
            font-size: 14px; 
            outline: none; 
            transition: 0.2s;
        }
        .input-group input:focus { 
            border-color: var(--primary); 
            background: #fff; 
        }

        .btn-primary {
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 15px;
            border-radius: 12px; 
            font-weight: 700; 
            cursor: pointer; 
            width: 100%;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            margin-top: auto;
        }

        /* --- TABELA --- */
        .table-card { 
            background: #fff; 
            border-radius: var(--radius-ios); 
            border: 0.5px solid var(--border); 
            overflow: hidden; 
            box-shadow: var(--shadow-ios); 
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
        }
        th { 
            background: #F9F9FB; 
            padding: 14px; 
            text-align: left; 
            font-size: 11px; 
            color: var(--system-gray); 
            border-bottom: 0.5px solid var(--border); 
        }
        td { 
            padding: 14px; 
            border-bottom: 0.5px solid var(--border); 
            font-size: 14px; 
        }

        .balance-danger { 
            background: var(--danger) !important; 
            color: #fff !important; 
        }
        .balance-danger .summary-label { 
            color: rgba(255,255,255,0.8); 
        }

        .chart-box { 
            flex: 1; 
            position: relative; 
            min-height: 0; 
        }

        /* === RESPONSIVIDADE === */

        /* Tablet: 2 colunas */
        @media (max-width: 1100px) and (min-width: 721px) {
            .dashboard-grid {
                grid-template-columns: repeat(2, 1fr) !important;
            }
            .dashboard-grid > :nth-child(3) {
                grid-column: span 2;
            }
            .card-main {
                height: auto !important;
                min-height: 400px;
            }
        }

        /* Celular: 1 coluna + navbar simplificada (sem ícone) */
        @media (max-width: 720px) {
            /* NAVBAR MOBILE - sem ícone */
            .desktop-nav-items {
                display: none !important;
            }
            
            .mobile-nav-items {
                display: flex !important;
            }
            
            .headbar {
                padding: 0 16px;
            }
            
            .logo-text {
                font-size: 18px;
            }
            
            /* Layout 1 coluna */
            .dashboard-grid {
                grid-template-columns: 1fr !important;
            }
            .dashboard-grid > :nth-child(3) {
                grid-column: span 1;
            }
            .card-main {
                height: auto !important;
                min-height: 420px;
            }
            .summary-row {
                gap: 12px;
            }
            .summary-item {
                padding: 16px;
            }
            .summary-val {
                font-size: 22px;
            }
        }

        /* Celular pequeno: tabela vira cards */
        @media (max-width: 550px) {
            table {
                display: none;
            }
            .table-card {
                background: transparent;
                box-shadow: none;
                padding: 0;
            }
            .mobile-cards {
                display: flex;
                flex-direction: column;
                gap: 14px;
            }
            .mobile-card-item {
                background: var(--surface);
                border-radius: var(--radius-ios);
                border: 0.5px solid var(--border);
                padding: 18px 16px;
                box-shadow: var(--shadow-ios);
                display: flex;
                flex-direction: column;
                gap: 12px;
            }
            .mobile-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .mobile-category span {
                background: #F2F2F7;
                padding: 5px 12px;
                border-radius: 40px;
                font-size: 11px;
                font-weight: 700;
            }
            .mobile-actions {
                display: flex;
                gap: 20px;
                justify-content: flex-end;
                border-top: 1px dashed var(--border);
                padding-top: 14px;
                margin-top: 6px;
            }
            .action-btn-mobile {
                background: transparent;
                border: none;
                cursor: pointer;
                color: var(--system-gray);
                padding: 8px;
                border-radius: 40px;
            }
            .delete-mobile {
                color: var(--danger);
            }
        }

        .mobile-cards {
            display: none;
        }

        /* Galaxy A35 */
        @media (max-width: 412px) {
            .btn-primary {
                padding: 16px;
            }
            .summary-item {
                padding: 14px;
            }
            .summary-val {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <header class="headbar">
        <!-- Logo sem ícone -->
        <div class="logo-area">
            <span class="logo-text">FinancePro</span>
            
            <!-- VERSÃO DESKTOP: mês completo -->
            <div class="desktop-nav-items">
                <div id="monthTextDisplay" class="current-month-display">---</div>
            </div>
            
            <!-- VERSÃO MOBILE: apenas texto do mês abreviado (sem ícone) -->
            <div class="mobile-nav-items">
                <div id="mobileMonthText" class="mobile-month-text">---</div>
            </div>
        </div>

        <!-- Seletor de mês (direita) -->
        <div style="display:flex; align-items:center; gap:12px;">
            <label class="desktop-nav-items" style="font-size: 11px; font-weight: 800; color: var(--system-gray);">IR PARA:</label>
            <input type="month" id="globalMonth" onchange="refreshUI()" style="border:none; background:rgba(0,122,255,0.1); color:var(--primary); padding:8px 12px; border-radius:10px; font-weight:700; cursor:pointer; outline:none;">
        </div>
    </header>

    <div class="container">
        <!-- CARDS DE RESUMO -->
        <div class="summary-row">
            <div class="summary-item">
                <div class="summary-label">Entradas</div>
                <div id="resIn" class="summary-val" style="color:var(--success)">R$ 0,00</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">Saídas</div>
                <div id="resOut" class="summary-val" style="color:var(--danger)">R$ 0,00</div>
            </div>
            <div class="summary-item" id="balanceCard">
                <div class="summary-label">Saldo Final</div>
                <div id="resTotal" class="summary-val">R$ 0,00</div>
            </div>
        </div>

        <!-- GRID 3 COLUNAS -->
        <div class="dashboard-grid">
            <!-- FORMULÁRIO -->
            <div class="card-main">
                <div class="card-title"><span class="material-icons-round" style="font-size:16px;">add_circle</span> Novo Lançamento</div>
                <form id="entryForm" style="flex:1; display:flex; flex-direction:column;">
                    <input type="hidden" id="editId">
                    <div class="input-group">
                        <label>DESCRIÇÃO</label>
                        <input type="text" id="desc" placeholder="Ex: Salário" required>
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <div class="input-group">
                            <label>VALOR (R$)</label>
                            <input type="number" id="amount" step="0.01" required placeholder="0,00">
                        </div>
                        <div class="input-group">
                            <label>TIPO</label>
                            <select id="type">
                                <option value="out">Despesa</option>
                                <option value="in">Receita</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>CATEGORIA</label>
                        <select id="category">
                            <option>Alimentação</option><option>Transporte</option><option>Moradia</option>
                            <option>Lazer</option><option>Saúde</option><option>Salário</option><option>Educação</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>DATA</label>
                        <input type="date" id="date" required>
                    </div>
                    <button type="submit" class="btn-primary" id="btnSave">
                        <span class="material-icons-round">bolt</span> Confirmar Lançamento
                    </button>
                </form>
            </div>

            <!-- GRÁFICO PIZZA -->
            <div class="card-main">
                <div class="card-title"><span class="material-icons-round" style="font-size:16px;">donut_small</span> Categorias</div>
                <div class="chart-box">
                    <canvas id="chartPie"></canvas>
                </div>
            </div>

            <!-- GRÁFICO LINHA -->
            <div class="card-main">
                <div class="card-title"><span class="material-icons-round" style="font-size:16px;">timeline</span> Evolução Diária</div>
                <div class="chart-box">
                    <canvas id="chartLine"></canvas>
                </div>
            </div>
        </div>

        <!-- TABELA + CARDS MOBILE -->
        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>DATA</th>
                        <th>DESCRIÇÃO</th>
                        <th>CATEGORIA</th>
                        <th>VALOR</th>
                        <th>AÇÕES</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div id="mobileCardsContainer" class="mobile-cards"></div>
        </div>
    </div>

<script>
    (function() {
        // DADOS
        let db = JSON.parse(localStorage.getItem('finance_pro_noicon')) || [];
        let pie, line;

        // Elementos
        const monthPicker = document.getElementById('globalMonth');
        const monthDisplay = document.getElementById('monthTextDisplay');
        const mobileMonth = document.getElementById('mobileMonthText');
        const tableBody = document.getElementById('tableBody');
        const mobileContainer = document.getElementById('mobileCardsContainer');
        const form = document.getElementById('entryForm');
        const editId = document.getElementById('editId');
        const desc = document.getElementById('desc');
        const amount = document.getElementById('amount');
        const type = document.getElementById('type');
        const category = document.getElementById('category');
        const date = document.getElementById('date');
        const btnSave = document.getElementById('btnSave');
        const resIn = document.getElementById('resIn');
        const resOut = document.getElementById('resOut');
        const resTotal = document.getElementById('resTotal');
        const balanceCard = document.getElementById('balanceCard');

        // Inicialização: mês atual
        function setCurrentMonth() {
            const today = new Date();
            const y = today.getFullYear();
            const m = String(today.getMonth() + 1).padStart(2, '0');
            monthPicker.value = `${y}-${m}`;
            date.valueAsDate = today;
        }
        setCurrentMonth();

        function formatMonthYear(monthVal) {
            if (!monthVal) return "---";
            const [y, m] = monthVal.split('-');
            const d = new Date(y, m-1);
            return d.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
        }

        function formatMonthShort(monthVal) {
            if (!monthVal) return "---";
            const [y, m] = monthVal.split('-');
            const d = new Date(y, m-1);
            return d.toLocaleDateString('pt-BR', { month: 'short' }).replace('.', '') + '/' + y.slice(-2);
        }

        // Filtrar por mês
        function getFiltered() {
            const selected = monthPicker.value;
            if (!selected) return [];
            return db.filter(t => t.date.startsWith(selected));
        }

        // Refresh UI
        function refreshUI() {
            const filtered = getFiltered();
            const monthLong = formatMonthYear(monthPicker.value);
            const monthShort = formatMonthShort(monthPicker.value);
            
            monthDisplay.innerText = monthLong;
            mobileMonth.innerText = monthShort;

            let ins = 0, outs = 0;
            filtered.forEach(t => {
                if (t.type === 'in') ins += t.amount;
                else outs += t.amount;
            });
            const total = ins - outs;
            resIn.innerText = `R$ ${ins.toFixed(2).replace('.', ',')}`;
            resOut.innerText = `R$ ${outs.toFixed(2).replace('.', ',')}`;
            resTotal.innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;

            if (total < 0) balanceCard.classList.add('balance-danger');
            else balanceCard.classList.remove('balance-danger');

            const sorted = [...filtered].sort((a,b) => new Date(b.date) - new Date(a.date));

            tableBody.innerHTML = sorted.map(t => {
                const sinal = t.type === 'in' ? '+' : '-';
                const cor = t.type === 'in' ? 'var(--success)' : '#000';
                return `<tr>
                    <td style="color:var(--system-gray); font-size:12px;">${t.date.split('-').reverse().join('/')}</td>
                    <td><b>${t.desc}</b></td>
                    <td><span style="background:#F2F2F7; padding:4px 8px; border-radius:6px; font-size:11px; font-weight:700;">${t.category}</span></td>
                    <td style="font-weight:800; color:${cor};">${sinal} R$ ${t.amount.toFixed(2).replace('.', ',')}</td>
                    <td>
                        <button onclick="editItem(${t.id})" style="border:none; background:none; cursor:pointer; color:var(--system-gray);"><span class="material-icons-round" style="font-size:18px">edit</span></button>
                        <button onclick="deleteItem(${t.id})" style="border:none; background:none; cursor:pointer; color:var(--danger); margin-left:8px;"><span class="material-icons-round" style="font-size:18px">delete</span></button>
                    </td>
                </tr>`;
            }).join('');

            mobileContainer.innerHTML = sorted.map(t => {
                const sinal = t.type === 'in' ? '+' : '-';
                const cor = t.type === 'in' ? '#34C759' : '#000';
                return `<div class="mobile-card-item">
                    <div class="mobile-row">
                        <span style="color:var(--system-gray); font-size:13px;">${t.date.split('-').reverse().join('/')}</span>
                        <div class="mobile-category"><span>${t.category}</span></div>
                    </div>
                    <div class="mobile-row" style="font-weight:600; font-size:16px;">${t.desc}</div>
                    <div class="mobile-row" style="font-weight:800; font-size:18px; color:${cor};">${sinal} R$ ${t.amount.toFixed(2).replace('.', ',')}</div>
                    <div class="mobile-actions">
                        <button class="action-btn-mobile" onclick="editItem(${t.id})"><span class="material-icons-round">edit</span></button>
                        <button class="action-btn-mobile delete-mobile" onclick="deleteItem(${t.id})"><span class="material-icons-round">delete</span></button>
                    </div>
                </div>`;
            }).join('');

            renderCharts(filtered, monthPicker.value);
        }

        function renderCharts(data, month) {
            const expenses = data.filter(x => x.type === 'out');
            const cats = {};
            expenses.forEach(x => cats[x.category] = (cats[x.category] || 0) + x.amount);

            if (pie) pie.destroy();
            pie = new Chart(document.getElementById('chartPie'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(cats),
                    datasets: [{ data: Object.values(cats), backgroundColor: ['#007AFF','#34C759','#FF3B30','#FF9500','#5856D6','#FFCC00','#AF52DE'], borderWidth: 0 }]
                },
                options: { maintainAspectRatio: false, cutout: '78%', plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, font: {size: 10} } } } }
            });

            if (!month) return;
            const [y, mNum] = month.split('-').map(Number);
            const days = new Date(y, mNum, 0).getDate();
            const dIn = Array(days).fill(0);
            const dOut = Array(days).fill(0);
            data.forEach(x => {
                const d = parseInt(x.date.split('-')[2]) - 1;
                if (x.type === 'in') dIn[d] += x.amount; else dOut[d] += x.amount;
            });

            if (line) line.destroy();
            line = new Chart(document.getElementById('chartLine'), {
                type: 'line',
                data: {
                    labels: Array.from({length: days}, (_, i) => i + 1),
                    datasets: [
                        { label: 'Entradas', data: dIn, borderColor: '#34C759', tension: 0.4, pointRadius: 0, fill: true, backgroundColor: 'rgba(52,199,89,0.05)' },
                        { label: 'Saídas', data: dOut, borderColor: '#FF3B30', tension: 0.4, pointRadius: 0, fill: true, backgroundColor: 'rgba(255,59,48,0.05)' }
                    ]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
            });
        }

        window.editItem = function(id) {
            const x = db.find(i => i.id === id);
            if (!x) return;
            editId.value = x.id;
            desc.value = x.desc;
            amount.value = x.amount;
            type.value = x.type;
            category.value = x.category;
            date.value = x.date;
            btnSave.innerHTML = '<span class="material-icons-round">sync</span> Atualizar Dados';
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        window.deleteItem = function(id) {
            if(confirm("Deseja realmente excluir este lançamento?")) {
                db = db.filter(i => i.id !== id);
                localStorage.setItem('finance_pro_noicon', JSON.stringify(db));
                refreshUI();
            }
        };

        form.onsubmit = (e) => {
            e.preventDefault();
            const id = editId.value;
            const entry = {
                id: id ? parseInt(id) : Date.now(),
                desc: desc.value,
                amount: parseFloat(amount.value),
                type: type.value,
                category: category.value,
                date: date.value,
                month: date.value.substring(0, 7)
            };
            if (id) db = db.map(x => x.id === entry.id ? entry : x);
            else db.push(entry);
            localStorage.setItem('finance_pro_noicon', JSON.stringify(db));
            form.reset();
            editId.value = '';
            btnSave.innerHTML = '<span class="material-icons-round">bolt</span> Confirmar Lançamento';
            date.valueAsDate = new Date();
            refreshUI();
        };

        monthPicker.addEventListener('change', refreshUI);
        refreshUI();
        window.refreshUI = refreshUI;
    })();
</script>

<style>
    @media (max-width: 550px) {
        .table-card {
            background: transparent !important;
        }
    }
    .action-btn-mobile {
        background: transparent;
        border: none;
        cursor: pointer;
        color: var(--system-gray);
        padding: 8px 12px;
        border-radius: 40px;
        font-size: 20px;
    }
    .action-btn-mobile:hover {
        background: #F2F2F7;
    }
    .delete-mobile {
        color: var(--danger);
    }
</style>

</body>
</html>
