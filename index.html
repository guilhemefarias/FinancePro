<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinancePro | Symmetrical Executive 2026</title>
    
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #007AFF;
            --success: #34C759;
            --danger: #FF3B30;
            --warning: #FF9500;
            --system-gray: #8E8E93;
            --background: #F2F2F7;
            --surface: #FFFFFF;
            --border: rgba(60, 60, 67, 0.12);
            --radius-ios: 16px;
            --shadow-ios: 0 10px 40px rgba(0,0,0,0.06);
            --headbar-height: 72px;
            --card-height: 450px; 
        }

        * { box-sizing: border-box; font-family: 'SF Pro Display', sans-serif; -webkit-font-smoothing: antialiased; }
        body { background-color: var(--background); color: #000; margin: 0; padding-top: calc(var(--headbar-height) + 10px); }

        /* --- HEADBAR --- */
        .headbar {
            height: var(--headbar-height);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-bottom: 0.5px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; position: fixed; top: 0; width: 100%; z-index: 1000;
        }

        .current-month-display {
            font-size: 18px; font-weight: 700; color: var(--primary);
            text-transform: capitalize; border-left: 1.5px solid var(--border);
            padding-left: 15px; margin-left: 15px;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* --- SUMMARY ROW --- */
        .summary-row {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 20px; margin-bottom: 25px;
        }
        .summary-item { background: #fff; padding: 20px; border-radius: var(--radius-ios); border: 0.5px solid var(--border); box-shadow: var(--shadow-ios); }
        .summary-label { font-size: 10px; font-weight: 800; color: var(--system-gray); text-transform: uppercase; letter-spacing: 1px; }
        .summary-val { font-size: 26px; font-weight: 800; margin-top: 5px; }

        /* --- GRID PRINCIPAL (3 COLUNAS) --- */
        .dashboard-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 20px; margin-bottom: 30px;
        }

        @media (max-width: 1100px) { .dashboard-grid { grid-template-columns: 1fr; } .card-main { height: auto !important; } }

        .card-main {
            background: var(--surface); border-radius: var(--radius-ios);
            border: 0.5px solid var(--border); box-shadow: var(--shadow-ios);
            padding: 24px; height: var(--card-height); display: flex; flex-direction: column;
        }

        .card-title { font-size: 11px; font-weight: 800; color: var(--system-gray); text-transform: uppercase; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

        /* --- FORM --- */
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 10px; font-weight: 700; color: var(--system-gray); margin-bottom: 4px; }
        .input-group input, .input-group select {
            width: 100%; padding: 12px; border-radius: 10px; border: 1.5px solid #F2F2F7;
            background: #F9F9FB; font-size: 14px; outline: none; transition: 0.2s;
        }
        .input-group input:focus { border-color: var(--primary); background: #fff; }

        .btn-primary {
            background: var(--primary); color: white; border: none; padding: 15px;
            border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: auto;
        }

        /* --- TABLE --- */
        .table-card { background: #fff; border-radius: var(--radius-ios); border: 0.5px solid var(--border); overflow: hidden; box-shadow: var(--shadow-ios); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #F9F9FB; padding: 14px; text-align: left; font-size: 11px; color: var(--system-gray); border-bottom: 0.5px solid var(--border); }
        td { padding: 14px; border-bottom: 0.5px solid var(--border); font-size: 14px; }

        .balance-danger { background: var(--danger) !important; color: #fff !important; }
        .balance-danger .summary-label { color: rgba(255,255,255,0.8); }

        .chart-box { flex: 1; position: relative; min-height: 0; }
    </style>
</head>
<body>

    <header class="headbar">
        <div style="display:flex; align-items:center;">
            <div class="logo" style="display:flex; align-items:center; gap:8px;">
                <span class="material-icons-round" style="color:var(--primary); font-size:28px;">account_balance</span>
                <span style="font-weight:800; font-size:20px;">FinancePro</span>
            </div>
            <div id="monthTextDisplay" class="current-month-display">---</div>
        </div>

        <div style="display:flex; align-items:center; gap:12px;">
            <label style="font-size: 11px; font-weight: 800; color: var(--system-gray);">IR PARA:</label>
            <input type="month" id="globalMonth" onchange="refreshUI()" style="border:none; background:rgba(0,122,255,0.1); color:var(--primary); padding:8px 12px; border-radius:10px; font-weight:700; cursor:pointer; outline:none;">
        </div>
    </header>

    <div class="container">
        <div class="summary-row">
            <div class="summary-item">
                <div class="summary-label">Entradas</div>
                <div id="resIn" class="summary-val" style="color:var(--success)">R$ 0,00</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">Saídas</div>
                <div id="resOut" class="summary-val" style="color:var(--danger)">R$ 0,00</div>
            </div>
            <div class="summary-item" id="balanceCard">
                <div class="summary-label">Saldo Final</div>
                <div id="resTotal" class="summary-val">R$ 0,00</div>
            </div>
        </div>

        <div class="dashboard-grid">
            
            <div class="card-main">
                <div class="card-title"><span class="material-icons-round" style="font-size:16px;">add_circle</span> Novo Lançamento</div>
                <form id="entryForm" style="flex:1; display:flex; flex-direction:column;">
                    <input type="hidden" id="editId">
                    <div class="input-group">
                        <label>DESCRIÇÃO</label>
                        <input type="text" id="desc" placeholder="Ex: Salário" required>
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <div class="input-group">
                            <label>VALOR (R$)</label>
                            <input type="number" id="amount" step="0.01" required placeholder="0,00">
                        </div>
                        <div class="input-group">
                            <label>TIPO</label>
                            <select id="type">
                                <option value="out">Despesa</option>
                                <option value="in">Receita</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>CATEGORIA</label>
                        <select id="category">
                            <option>Alimentação</option><option>Transporte</option><option>Moradia</option>
                            <option>Lazer</option><option>Saúde</option><option>Salário</option><option>Educação</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>DATA</label>
                        <input type="date" id="date" required>
                    </div>
                    <button type="submit" class="btn-primary" id="btnSave">
                        <span class="material-icons-round">bolt</span> Confirmar Lançamento
                    </button>
                </form>
            </div>

            <div class="card-main">
                <div class="card-title"><span class="material-icons-round" style="font-size:16px;">donut_small</span> Categorias</div>
                <div class="chart-box">
                    <canvas id="chartPie"></canvas>
                </div>
            </div>

            <div class="card-main">
                <div class="card-title"><span class="material-icons-round" style="font-size:16px;">timeline</span> Evolução Diária</div>
                <div class="chart-box">
                    <canvas id="chartLine"></canvas>
                </div>
            </div>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>DATA</th>
                        <th>DESCRIÇÃO</th>
                        <th>CATEGORIA</th>
                        <th>VALOR</th>
                        <th>AÇÕES</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

<script>
    let db = JSON.parse(localStorage.getItem('fin_v11_auto')) || [];
    let pie, line;

    // Detecta o mês atual do sistema ao abrir
    window.onload = () => {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const monthInput = `${year}-${month}`;
        
        document.getElementById('globalMonth').value = monthInput;
        document.getElementById('date').valueAsDate = now;
        
        refreshUI();
    };

    function formatMonthYear(monthVal) {
        if(!monthVal) return "---";
        const [year, month] = monthVal.split('-');
        const date = new Date(year, month - 1);
        return date.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
    }

    document.getElementById('entryForm').onsubmit = (e) => {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        const entry = {
            id: id ? parseInt(id) : Date.now(),
            desc: document.getElementById('desc').value,
            amount: parseFloat(document.getElementById('amount').value),
            type: document.getElementById('type').value,
            category: document.getElementById('category').value,
            date: document.getElementById('date').value,
            month: document.getElementById('date').value.substring(0, 7)
        };
        if(id) db = db.map(x => x.id === entry.id ? entry : x);
        else db.push(entry);
        localStorage.setItem('fin_v11_auto', JSON.stringify(db));
        resetForm();
        refreshUI();
    };

    function resetForm() {
        document.getElementById('entryForm').reset();
        document.getElementById('editId').value = '';
        document.getElementById('btnSave').innerHTML = '<span class="material-icons-round">bolt</span> Confirmar Lançamento';
        document.getElementById('date').valueAsDate = new Date();
    }

    function editItem(id) {
        const x = db.find(i => i.id === id);
        document.getElementById('editId').value = x.id;
        document.getElementById('desc').value = x.desc;
        document.getElementById('amount').value = x.amount;
        document.getElementById('type').value = x.type;
        document.getElementById('category').value = x.category;
        document.getElementById('date').value = x.date;
        document.getElementById('btnSave').innerText = "Atualizar Dados";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function deleteItem(id) {
        if(confirm("Deseja realmente excluir este lançamento?")) {
            db = db.filter(i => i.id !== id);
            localStorage.setItem('fin_v11_auto', JSON.stringify(db));
            refreshUI();
        }
    }

    function refreshUI() {
        const monthVal = document.getElementById('globalMonth').value;
        document.getElementById('monthTextDisplay').innerText = formatMonthYear(monthVal);

        const filtered = db.filter(x => x.month === monthVal).sort((a,b) => new Date(b.date) - new Date(a.date));

        document.getElementById('tableBody').innerHTML = filtered.map(x => `
            <tr>
                <td style="color:var(--system-gray); font-size:12px;">${x.date.split('-').reverse().join('/')}</td>
                <td><b>${x.desc}</b></td>
                <td><span style="background:#F2F2F7; padding:4px 8px; border-radius:6px; font-size:11px; font-weight:700;">${x.category}</span></td>
                <td style="font-weight:800; color:${x.type==='in'?'var(--success)':'#000'}">
                    ${x.type==='in'?'+':'-'} R$ ${x.amount.toLocaleString('pt-BR', {minimumFractionDigits:2})}
                </td>
                <td>
                    <button onclick="editItem(${x.id})" style="border:none; background:none; cursor:pointer; color:var(--system-gray);"><span class="material-icons-round" style="font-size:18px">edit</span></button>
                    <button onclick="deleteItem(${x.id})" style="border:none; background:none; cursor:pointer; color:var(--danger); margin-left:8px;"><span class="material-icons-round" style="font-size:18px">delete</span></button>
                </td>
            </tr>
        `).join('');

        const ins = filtered.filter(x => x.type === 'in').reduce((a,b) => a + b.amount, 0);
        const outs = filtered.filter(x => x.type === 'out').reduce((a,b) => a + b.amount, 0);
        const total = ins - outs;

        document.getElementById('resIn').innerText = `R$ ${ins.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
        document.getElementById('resOut').innerText = `R$ ${outs.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
        document.getElementById('resTotal').innerText = `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
        
        const bCard = document.getElementById('balanceCard');
        if(total < 0) bCard.classList.add('balance-danger'); else bCard.classList.remove('balance-danger');

        renderCharts(filtered, monthVal);
    }

    function renderCharts(data, month) {
        const expenses = data.filter(x => x.type === 'out');
        const cats = {};
        expenses.forEach(x => cats[x.category] = (cats[x.category] || 0) + x.amount);

        if(pie) pie.destroy();
        pie = new Chart(document.getElementById('chartPie'), {
            type: 'doughnut',
            data: {
                labels: Object.keys(cats),
                datasets: [{ data: Object.values(cats), backgroundColor: ['#007AFF','#34C759','#FF3B30','#FF9500','#5856D6','#FFCC00','#AF52DE'], borderWidth: 0 }]
            },
            options: { maintainAspectRatio: false, cutout: '78%', plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, font: {size: 10} } } } }
        });

        const [y, mNum] = month.split('-').map(Number);
        const days = new Date(y, mNum, 0).getDate();
        const dIn = Array(days).fill(0);
        const dOut = Array(days).fill(0);
        data.forEach(x => {
            const d = parseInt(x.date.split('-')[2]) - 1;
            if(x.type === 'in') dIn[d] += x.amount; else dOut[d] += x.amount;
        });

        if(line) line.destroy();
        line = new Chart(document.getElementById('chartLine'), {
            type: 'line',
            data: {
                labels: Array.from({length: days}, (_, i) => i + 1),
                datasets: [
                    { label: 'Entradas', data: dIn, borderColor: '#34C759', tension: 0.4, pointRadius: 0, fill: true, backgroundColor: 'rgba(52,199,89,0.05)' },
                    { label: 'Saídas', data: dOut, borderColor: '#FF3B30', tension: 0.4, pointRadius: 0, fill: true, backgroundColor: 'rgba(255,59,48,0.05)' }
                ]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
        });
    }
</script>
</body>
</html>
